services:

  postgres:
    image: postgres:17

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: job_platform

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:management

    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: ./api

    ports:
      - "5000:5000"

    environment:
      PORT: 5000

      JWT_SECRET: supersecretjwt

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: job_platform
      DB_USER: admin
      DB_PASSWORD: admin123

      REDIS_URL: redis://redis:6379

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

    depends_on:
      - postgres
      - redis
      - rabbitmq

  worker:
    build:
      context: ./worker

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: job_platform
      DB_USER: admin
      DB_PASSWORD: admin123

      REDIS_URL: redis://redis:6379

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

    depends_on:
      - postgres
      - redis
      - rabbitmq

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - api

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: